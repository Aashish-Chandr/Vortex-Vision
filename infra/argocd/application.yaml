apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vortexvision
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/vortexvision
    targetRevision: main
    path: infra/k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: vortexvision
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexvision-detector
  namespace: vortexvision
  labels:
    app: vortexvision-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vortexvision-detector
  template:
    metadata:
      labels:
        app: vortexvision-detector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: detector
          image: vortexvision/detector:latest
          ports:
            - name: metrics
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: vortexvision-config
          env:
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: vortexvision-secrets
                  key: kafka-bootstrap
          volumeMounts:
            - name: models
              mountPath: /data/models
              readOnly: true
            - name: clips
              mountPath: /data/clips
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vortexvision-models-pvc
        - name: clips
          persistentVolumeClaim:
            claimName: vortexvision-clips-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vortexvision-detector
  namespace: vortexvision
  labels:
    app: vortexvision-detector
spec:
  selector:
    app: vortexvision-detector
  ports:
    - name: metrics
      port: 8001
      targetPort: 8001
  type: ClusterIP

apiVersion: v1
kind: ConfigMap
metadata:
  name: vortexvision-config
  namespace: vortexvision
data:
  YOLO_MODEL: "yolo26n.pt"
  YOLO_DEVICE: "cuda"
  YOLO_CONF: "0.4"
  YOLO_IOU: "0.5"
  FPS_LIMIT: "30"
  AE_THRESHOLD: "0.05"
  TRANSFORMER_THRESHOLD: "0.7"
  SEQ_LEN: "16"
  VLM_MODE: "api"
  VLM_MODEL: "Qwen/Qwen2.5-VL-7B-Instruct"
  VLM_API_BASE: "http://vlm-service:8080/v1"
  VLM_MAX_TOKENS: "512"
  CLIP_STORAGE_PATH: "/data/clips"
  MODEL_STORAGE_PATH: "/data/models"
  KAFKA_FRAMES_TOPIC: "video-frames"
  KAFKA_ANNOTATED_TOPIC: "annotated-frames"
  KAFKA_EVENTS_TOPIC: "anomaly-events"
  KAFKA_CONSUMER_GROUP: "detection-group"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  LOG_LEVEL: "INFO"
  RATE_LIMIT_PER_MINUTE: "120"

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vortexvision-api-hpa
  namespace: vortexvision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vortexvision-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: vortexvision_api_requests_total
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vortexvision-detector-hpa
  namespace: vortexvision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vortexvision-detector
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600

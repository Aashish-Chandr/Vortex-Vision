apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vortexvision-ingress
  namespace: vortexvision
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://vortexvision.example.com"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - api.vortexvision.example.com
        - app.vortexvision.example.com
      secretName: vortexvision-tls
  rules:
    - host: api.vortexvision.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vortexvision-api
                port:
                  number: 80
    - host: app.vortexvision.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vortexvision-frontend
                port:
                  number: 8501

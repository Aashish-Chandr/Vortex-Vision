apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexvision-frontend
  namespace: vortexvision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vortexvision-frontend
  template:
    metadata:
      labels:
        app: vortexvision-frontend
    spec:
      containers:
        - name: frontend
          image: vortexvision/frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE
              value: "http://vortexvision-api"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vortexvision-frontend
  namespace: vortexvision
spec:
  selector:
    app: vortexvision-frontend
  ports:
    - port: 8501
      targetPort: 8501
  type: ClusterIP

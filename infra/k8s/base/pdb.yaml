apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vortexvision-api-pdb
  namespace: vortexvision
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vortexvision-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vortexvision-detector-pdb
  namespace: vortexvision
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vortexvision-detector

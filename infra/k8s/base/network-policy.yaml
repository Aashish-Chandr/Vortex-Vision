apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vortexvision-api-netpol
  namespace: vortexvision
spec:
  podSelector:
    matchLabels:
      app: vortexvision-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: vortexvision-frontend
      ports:
        - port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: vlm-service
      ports:
        - port: 8080
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vortexvision-detector-netpol
  namespace: vortexvision
spec:
  podSelector:
    matchLabels:
      app: vortexvision-detector
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    - to: []
      ports:
        - port: 53
          protocol: UDP

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Install only the lightweight linting tools — no heavy ML deps
      - name: Install linters
        run: pip install ruff==0.4.10 black==24.4.2 mypy==1.10.0

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        run: |
          pip install pydantic pydantic-settings fastapi sqlalchemy
          mypy api/ detection/ anomaly/ vlm/ ingestion/ config/ \
            --ignore-missing-imports \
            --no-error-summary

  # ── Security Scanning ───────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]>=1.7.8

      - name: Run Bandit SAST
        run: |
          bandit -r api/ detection/ anomaly/ vlm/ ingestion/ mlops/ \
            -ll -ii \
            --skip B101,B311,B603,B607 \
            -f json -o bandit-report.json || true
          bandit -r api/ detection/ anomaly/ vlm/ ingestion/ mlops/ \
            -ll -ii \
            --skip B101,B311,B603,B607

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit>=2.7.0
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vortexvision_test
          POSTGRES_USER: vortex
          POSTGRES_PASSWORD: vortex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: sqlite+aiosqlite:///./test_vortexvision.db
      API_SECRET_KEY: test-secret-key-for-ci
      KAFKA_BOOTSTRAP: localhost:9092
      YOLO_DEVICE: cpu
      VLM_MODE: api
      MODEL_STORAGE_PATH: /tmp/vortexvision_test_models
      CLIP_STORAGE_PATH: /tmp/vortexvision_test_clips
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Use lightweight CI requirements — no torch/ray/ultralytics
      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      # Install stubs for mocked heavy deps so imports don't crash
      - name: Install mock stubs
        run: |
          pip install \
            opencv-python-headless \
            torch --index-url https://download.pytorch.org/whl/cpu \
            torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Create required directories
        run: mkdir -p /tmp/vortexvision_test_models /tmp/vortexvision_test_clips

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=api --cov=anomaly --cov=detection --cov=ingestion --cov=config \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -x \
            --ignore=tests/load

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build & Push Images ─────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, detector, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ── Model Validation ────────────────────────────────────────────────────────
  model-validation:
    name: Model Validation
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt dvc[s3]

      - name: Pull test data via DVC
        run: dvc pull data/processed/test --no-run-cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Validate model metrics
        run: python mlops/evaluate.py --model-dir models --data-dir data/processed/test
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        continue-on-error: true

  # ── Deploy (GitOps via ArgoCD) ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [build, model-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN || github.token }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags
        run: |
          cd infra/k8s/overlays/production
          kustomize edit set image \
            vortexvision/api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }} \
            vortexvision/detector=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/detector:${{ github.sha }} \
            vortexvision/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/production/
          git diff --staged --quiet || git commit -m "ci: deploy ${{ github.sha }}"
          git push

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "✅ VortexVision deployed: ${{ github.sha }} by ${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

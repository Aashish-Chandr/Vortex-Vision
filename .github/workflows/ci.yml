name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install "ruff==0.4.10"

      - name: Auto-fix then check (fail only on unfixable violations)
        run: |
          ruff check --fix api/ anomaly/ config/ detection/ ingestion/ vlm/ mlops/ monitoring/ || true
          ruff check api/ anomaly/ config/ detection/ ingestion/ vlm/ mlops/ monitoring/

  # ── Security ──────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install "bandit[toml]==1.7.9" "pip-audit==2.7.3"

      - name: Bandit SAST scan
        run: >
          bandit -r api/ detection/ anomaly/ vlm/ ingestion/ mlops/
          -ll -ii
          --skip B101,B105,B106,B311,B603,B607
          -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: pip-audit vulnerability scan
        run: pip-audit -r requirements-ci.txt
        continue-on-error: true

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///./test_vortexvision.db"
      API_SECRET_KEY: "test-secret-key-for-ci-only"
      KAFKA_BOOTSTRAP: "localhost:9092"
      YOLO_DEVICE: "cpu"
      VLM_MODE: "api"
      MODEL_STORAGE_PATH: "/tmp/vv_models"
      CLIP_STORAGE_PATH: "/tmp/vv_clips"
      REDIS_URL: "redis://localhost:6379"
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-ci.txt

      - name: Create required directories
        run: mkdir -p /tmp/vv_models /tmp/vv_clips

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=api --cov=anomaly --cov=detection --cov=ingestion --cov=config \
            --cov-report=xml \
            --cov-report=term-missing \
            --ignore=tests/load \
            -p no:warnings \
            -x

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build & Push ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, detector, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ── Model Validation ──────────────────────────────────────────────────────────
  model-validation:
    name: Model Validation
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt "dvc[s3]==3.50.1"

      - name: Pull test data via DVC
        run: dvc pull data/processed/test --no-run-cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Validate model metrics
        run: python mlops/evaluate.py --model-dir models --data-dir data/processed/test
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        continue-on-error: true

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [build, model-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN || github.token }}

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          rm kustomize.tar.gz

      - name: Update image tags
        run: |
          cd infra/k8s/overlays/production
          kustomize edit set image \
            vortexvision/api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }} \
            vortexvision/detector=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/detector:${{ github.sha }} \
            vortexvision/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/production/
          git diff --staged --quiet || git commit -m "ci: deploy ${{ github.sha }}"
          git push

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"VortexVision deployed: ${{ github.sha }} by ${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

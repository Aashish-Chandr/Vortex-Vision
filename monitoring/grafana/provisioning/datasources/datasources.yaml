apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: vortexvision
    user: vortex
    secureJsonData:
      password: "${GF_DATASOURCE_POSTGRES_PASSWORD}"
    jsonData:
      sslmode: disable
      postgresVersion: 1600

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: vortexvision
    env: production

rule_files:
  - "rules.yaml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "vortexvision-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "vortexvision-detector"
    static_configs:
      - targets: ["detector:8001"]
    metrics_path: /metrics

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
